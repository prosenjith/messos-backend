openapi: "3.1.0"
info:
  title: "MessOS API"
  description: "Backend API for the MessOS mess management application"
  version: "1.0.0"
servers:
  - url: "http://localhost:8080"
    description: "Local development"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "UNAUTHORIZED"
        message:
          type: string
          example: "Invalid credentials"

    ApiFailure:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: "#/components/schemas/ApiError"

    TokenResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [token]
          properties:
            token:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    UserResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [id, name, phoneOrEmail]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: "Rahim Khan"
            phoneOrEmail:
              type: string
              example: "rahim@example.com"

    MessResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Rahim's Mess"
        joinCode:
          type: string
          example: "ABC12345"
        managerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    MemberInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Rahim Khan"
        role:
          type: string
          enum: [MANAGER, MEMBER]

    MessWithTokenResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [mess, token]
          properties:
            mess:
              $ref: "#/components/schemas/MessResponse"
            token:
              type: string
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    MessDetailResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [id, name, joinCode, managerId, createdAt, members]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: "Rahim's Mess"
            joinCode:
              type: string
              example: "ABC12345"
            managerId:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
            members:
              type: array
              items:
                $ref: "#/components/schemas/MemberInfo"

    MealResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [id, memberId, memberName, date, breakfastCount, lunchCount, dinnerCount, updatedAt]
          properties:
            id:
              type: string
              format: uuid
            memberId:
              type: string
              format: uuid
            memberName:
              type: string
              example: "Rahim Khan"
            date:
              type: string
              format: date
              example: "2026-07-04"
            breakfastCount:
              type: number
              example: 1.0
            lunchCount:
              type: number
              example: 1.0
            dinnerCount:
              type: number
              example: 0.5
            updatedAt:
              type: string
              format: date-time

    MealListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/MealResponse/properties/data"

    DeletedResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            deleted:
              type: boolean
              example: true

paths:
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phoneOrEmail, password]
              properties:
                name:
                  type: string
                  example: "Rahim Khan"
                phoneOrEmail:
                  type: string
                  example: "rahim@example.com"
                password:
                  type: string
                  example: "secret123"
      responses:
        "201":
          description: User created, JWT returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "409":
          description: Phone/email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneOrEmail, password]
              properties:
                phoneOrEmail:
                  type: string
                  example: "rahim@example.com"
                password:
                  type: string
                  example: "secret123"
      responses:
        "200":
          description: Login successful, JWT returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

  /api/v1/mess:
    post:
      tags: [Mess]
      summary: Create a new mess
      description: Creates the mess, auto-opens the first monthly cycle, and returns a new JWT containing messId and role=MANAGER.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "Rahim's Mess"
      responses:
        "201":
          description: Mess created; new JWT issued with messId and role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessWithTokenResponse"
        "400":
          description: Validation error (blank name or already in a mess)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

  /api/v1/mess/join:
    post:
      tags: [Mess]
      summary: Join a mess via join code
      description: Validates the join code, adds the user as MEMBER, and returns a new JWT with messId and role=MEMBER.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [joinCode]
              properties:
                joinCode:
                  type: string
                  example: "ABC12345"
      responses:
        "200":
          description: Joined successfully; new JWT issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessWithTokenResponse"
        "400":
          description: Invalid join code or already in a mess
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

  /api/v1/mess/{id}:
    get:
      tags: [Mess]
      summary: Get mess details
      description: Returns mess info and member list. Caller must be a member of the mess.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mess details with member list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessDetailResponse"
        "403":
          description: Caller is not a member of this mess
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

  /api/v1/meals:
    post:
      tags: [Meals]
      summary: Log or update meal counts for a member on a date
      description: |
        Upserts meal counts for the given member and date within the current open cycle.
        MANAGER can log for any member; MEMBER can only log for themselves.
        Counts are decimals (0.5 = half-meal).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memberId, date]
              properties:
                memberId:
                  type: string
                  format: uuid
                  description: User UUID of the member to log for
                date:
                  type: string
                  format: date
                  example: "2026-07-04"
                breakfastCount:
                  type: number
                  default: 0.0
                lunchCount:
                  type: number
                  default: 0.0
                dinnerCount:
                  type: number
                  default: 0.0
      responses:
        "200":
          description: Meal logged/updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealResponse"
        "400":
          description: Validation error (future date, negative count, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"
        "403":
          description: Member trying to log for another member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

    get:
      tags: [Meals]
      summary: List all meals for the current open cycle
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Meals ordered by date
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        memberId:
                          type: string
                          format: uuid
                        memberName:
                          type: string
                        date:
                          type: string
                          format: date
                        breakfastCount:
                          type: number
                        lunchCount:
                          type: number
                        dinnerCount:
                          type: number
                        updatedAt:
                          type: string
                          format: date-time
        "403":
          description: Not a member of any mess
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

  /api/v1/meals/{id}:
    delete:
      tags: [Meals]
      summary: Delete a meal entry
      description: MANAGER can delete any meal; MEMBER can only delete their own.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Meal deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
        "403":
          description: Member trying to delete another member's meal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"
        "404":
          description: Meal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

  /api/v1/expenses:
    post:
      tags: [Expenses]
      summary: Add a shared mess expense (MANAGER only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, date]
              properties:
                amount:
                  type: number
                  example: 1500.00
                date:
                  type: string
                  format: date
                  example: "2026-07-04"
                note:
                  type: string
                  example: "Rice and vegetables"
                receiptPhotoUrl:
                  type: string
                  example: "https://..."
      responses:
        "201":
          description: Expense recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id: {type: string, format: uuid}
                      amount: {type: number}
                      date: {type: string, format: date}
                      note: {type: string, nullable: true}
                      receiptPhotoUrl: {type: string, nullable: true}
                      loggedBy: {type: string, format: uuid}
                      loggedByName: {type: string}
                      createdAt: {type: string, format: date-time}
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"
        "403":
          description: Caller is not the manager
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

    get:
      tags: [Expenses]
      summary: List all expenses for the current open cycle
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Expense list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: {type: string, format: uuid}
                        amount: {type: number}
                        date: {type: string, format: date}
                        note: {type: string, nullable: true}
                        receiptPhotoUrl: {type: string, nullable: true}
                        loggedBy: {type: string, format: uuid}
                        loggedByName: {type: string}
                        createdAt: {type: string, format: date-time}

  /api/v1/expenses/{id}:
    delete:
      tags: [Expenses]
      summary: Delete an expense (MANAGER only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Expense deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
        "403":
          description: Caller is not the manager
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"
        "404":
          description: Expense not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

  /api/v1/deposits:
    post:
      tags: [Deposits]
      summary: Record a cash deposit from a member (MANAGER only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memberId, amount, date]
              properties:
                memberId:
                  type: string
                  format: uuid
                  description: User UUID of the member making the deposit
                amount:
                  type: number
                  example: 500.00
                date:
                  type: string
                  format: date
                  example: "2026-07-04"
      responses:
        "201":
          description: Deposit recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: object
                    properties:
                      id: {type: string, format: uuid}
                      memberId: {type: string, format: uuid}
                      memberName: {type: string}
                      amount: {type: number}
                      date: {type: string, format: date}
                      loggedBy: {type: string, format: uuid}
                      loggedByName: {type: string}
                      createdAt: {type: string, format: date-time}
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"
        "403":
          description: Caller is not the manager
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"

    get:
      tags: [Deposits]
      summary: List all deposits for the current open cycle
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Deposit list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: {type: string, format: uuid}
                        memberId: {type: string, format: uuid}
                        memberName: {type: string}
                        amount: {type: number}
                        date: {type: string, format: date}
                        loggedBy: {type: string, format: uuid}
                        loggedByName: {type: string}
                        createdAt: {type: string, format: date-time}

  /api/v1/deposits/{id}:
    delete:
      tags: [Deposits]
      summary: Delete a deposit (MANAGER only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deposit deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
        "403":
          description: Caller is not the manager
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"
        "404":
          description: Deposit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFailure"
