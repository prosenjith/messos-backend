ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [com.prosenjith.messos.ApplicationKt.module]
  }
}

database {
  url = "jdbc:postgresql://localhost:5432/messos_db"
  url = ${?DATABASE_URL}
  driver = "org.postgresql.Driver"
  username = "messos"
  username = ${?DATABASE_USERNAME}
  password = "messos_dev"
  password = ${?DATABASE_PASSWORD}
  pool {
    maximumPoolSize = 10
    minimumIdle = 2
  }
}

jwt {
  secret = "dev-secret-do-not-use-in-production-please-change-this"
  secret = ${?JWT_SECRET}
  issuer = "messos-api"
  audience = "messos-app"
  expiryDays = 30
  expiryDays = ${?JWT_EXPIRY_DAYS}
}
