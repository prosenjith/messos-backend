name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────
  # Runs on every push to main and on every PR.
  # No database required — DuesCalculatorTest is pure unit tests;
  # ApplicationTest is a placeholder with no real assertions yet.
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run tests
        run: ./gradlew test --no-daemon

  # ── Deploy ─────────────────────────────────────────────────────────────────
  # Only runs on push to main, and only after test passes.
  # Never runs on pull requests.
  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        shell: bash
        run: curl -fsSL https://railway.app/install.sh | sh

      - name: Deploy
        run: railway up --service messos-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
